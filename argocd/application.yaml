apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multi-region-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Priyanka05f0/multi-region-kubernetes-platform.git
    targetRevision: main
    path: kubernetes  # This points to your app manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true